# ABS_PREPARE Macros
[gcode_macro ABS_PREPARE]
description: Prepares printer for ABS printing
gcode:
  SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=chamber_fan TARGET=58
  SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET=55
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=90


###########################################
# SCREWS_CALIBRATION Macros
[screws_tilt_adjust]
screw1: 35, 35
screw1_name: front left
screw2: 275, 35
screw2_name: front right
screw3: 275, 275
screw3_name: rear right
screw4: 35, 275
screw4_name: rear left
horizontal_move_z: 5
speed: 300
screw_thread: CW-M4

[gcode_macro SCREWS_CALIBRATION]
description: For screws manual iterative calibration
gcode:
    G28
    M190 S70          ; wait for bed to hit 60C (PLA temp), 70C PETG, 90C ABS
    M109 S150         ; nozzle warm but not oozing
    G28 Z             ; re-home Z at temp
    SCREWS_TILT_CALCULATE


