# FILAMENT Macros
[gcode_macro MY_UNLOAD_FILAMENT]
gcode:
  {% set TEMP = params.TEMP|default(240)|int %}
  SAVE_GCODE_STATE NAME=unload_state
  M109 S{TEMP}
  RESPOND TYPE=command MSG="Unloading filament..."
  M83
  G1 E10 F300
  G1 E-15 F3000
  G1 E-22.4700 F2400
  G1 E-6.4200 F1200
  G1 E-3.2100 F720
  G1 E5.0000 F356
  G1 E-5.0000 F384
  G1 E5.0000 F412
  G1 E-5.0000 F440
  G1 E5.0000 F467
  G1 E-5.0000 F495
  G1 E5.0000 F523
  G1 E-5.0000 F3000
  G1 E-90 F3000
  M400
  RESTORE_GCODE_STATE NAME=unload_state

[gcode_macro MY_LOAD_FILAMENT]
gcode:
  {% set TEMP = params.TEMP|default(240)|int %}
  SAVE_GCODE_STATE NAME=load_state
  M109 S{TEMP}
  RESPOND TYPE=command MSG="Loading filament..."
  M83
  G1 E140 F180
  M400
  RESTORE_GCODE_STATE NAME=load_state
  

