###########################################
# WARMUP (movement stress test — adopted from K1)
[gcode_macro WARMUP]
description: Movement warm-up to seat bearings and rods. Usage: WARMUP LOOPS=10 ACCEL=5000
gcode:
  {% set loops = params.LOOPS|default(10)|int %}
  {% set accel = params.ACCEL|default(5000)|int %}

  {% set start_x = 5 | int %}
  {% set start_y = 5 | int %}
  {% set end_x = (printer["gcode_macro PRINTER_PARAM"].max_x_position -5) %}
  {% set end_y = (printer["gcode_macro PRINTER_PARAM"].max_y_position -5) %}

  {action_respond_info("Starting warmup: %d loops at %d mm/s² acceleration" % (loops, accel))}
  {action_respond_info("This moves the toolhead across the full bed. Make sure it is clear.")}

  {% if printer.toolhead.homed_axes != "xyz" %}
    G28
  {% endif %}

  ; Save current acceleration
  SAVE_GCODE_STATE NAME=warmup_state

  SET_VELOCITY_LIMIT ACCEL={accel}

  G90
  G1 F18000 # 300 mm/s

  {% for i in range(loops) %}
    G1 X{start_x} Y{start_y}
    G1 X{end_x}   Y{start_y}
    G1 X{end_x}   Y{end_y}
    G1 X{start_x} Y{end_y}
    G1 X{start_x} Y{start_y}
    G1 X{end_x}   Y{end_y}
    G1 X{start_x} Y{end_y}
    G1 X{end_x}   Y{start_y}
  {% endfor %}

  G1 X{(end_x / 2)|int} Y{(end_y / 2)|int}

  ; Restore original acceleration
  RESTORE_GCODE_STATE NAME=warmup_state

  {action_respond_info("Warmup complete. %d loops done." % loops)}


###########################################
# Generate raw CSV data for external analysis 
[gcode_macro TEST_RESONANCES_GRAPHS]
description: Generate raw resonance CSV data for both axes for external analysis
gcode:
  {% set enabled = printer["filament_switch_sensor filament_sensor"].enabled %}
  {% if enabled %}
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0
  {% endif %}

  {% if printer.toolhead.homed_axes != "xyz" %}
    G28
  {% endif %}

  {% set POSITION_X = printer.configfile.settings['stepper_x'].position_max/2 %}
  {% set POSITION_Y = printer.configfile.settings['stepper_y'].position_max/2 %}
  G90
  G1 Z10 F600
  G1 X{POSITION_X} Y{POSITION_Y} F6000
  M400

  {action_respond_info("Generating resonance data for X axis...")}
  TEST_RESONANCES AXIS=X OUTPUT=raw_data NAME=resonance_x

  M400

  {action_respond_info("Generating resonance data for Y axis...")}
  TEST_RESONANCES AXIS=Y OUTPUT=raw_data NAME=resonance_y

  {% if enabled %}
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=1
  {% endif %}

  {action_respond_info("Done. CSV files saved to /mnt/UDISK/printer_data/config/")}
  {action_respond_info("Download via Fluidd file manager for analysis with Klipper's calibrate_shaper.py")}


###########################################
# Belt tension analysis 
[gcode_macro BELTS_SHAPER_CALIBRATION]
description: Analyse belt tension via frequency sweep. Compare A and B profiles.
gcode:
  {% set min_freq     = params.MIN_FREQ|default(5.0) | float %}
  {% set max_freq     = params.MAX_FREQ|default(60.0) | float %}
  {% set hz_per_sec   = params.HZ_PER_SEC|default(1.0) | float %}
  {% set accel_per_hz = params.ACCEL_PER_HZ|default(200.0) | float %}

  {% set enabled = printer["filament_switch_sensor filament_sensor"].enabled %}
  {% if enabled %}
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0
  {% endif %}

  {% if printer.toolhead.homed_axes != "xyz" %}
    G28
  {% endif %}

  {% set POSITION_X = printer.configfile.settings['stepper_x'].position_max/2 %}
  {% set POSITION_Y = printer.configfile.settings['stepper_y'].position_max/2 %}
  G90
  G1 Z10 F600
  G1 X{POSITION_X} Y{POSITION_Y} F6000
  M400

  {action_respond_info("Starting belt tension analysis...")}
  {action_respond_info("Min freq: %.1fHz  Max freq: %.1fHz" % (min_freq, max_freq))}
  {action_respond_info("Both axes should show similar frequency peaks if belt tension is balanced.")}
  {action_respond_info("Unbalanced peaks indicate one belt is tighter/looser than the other.")}

  TEST_RESONANCES AXIS=1,-1 OUTPUT=raw_data NAME=belt_a \
    FREQ_START={min_freq} FREQ_END={max_freq} \
    HZ_PER_SEC={hz_per_sec} ACCEL_PER_HZ={accel_per_hz}

  M400

  TEST_RESONANCES AXIS=1,1 OUTPUT=raw_data NAME=belt_b \
    FREQ_START={min_freq} FREQ_END={max_freq} \
    HZ_PER_SEC={hz_per_sec} ACCEL_PER_HZ={accel_per_hz}

  {% if enabled %}
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=1
  {% endif %}

  {action_respond_info("Belt analysis complete.")}
  {action_respond_info("CSV files saved to /mnt/UDISK/printer_data/config/")}
  {action_respond_info("Download and plot both files to compare belt frequency profiles.")}


