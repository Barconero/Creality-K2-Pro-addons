###########################################
# ADAPTIVE Purge Line Macros
[output_pin Adaptive_PURGE_Line]
pin: virtual_pin:Adaptive_PURGE_Line_pin
value: 1

[delayed_gcode RESTORE_PURGE_MODE]
initial_duration: 2.5
gcode:
    {% set saved_state = printer.save_variables.variables.purge_mode | default(1) | int %}
    SET_PIN PIN=Adaptive_PURGE_Line VALUE={saved_state}
    UPDATE_DELAYED_GCODE ID=SYNC_PURGE_LOOP DURATION=3

[delayed_gcode SYNC_PURGE_LOOP]
gcode:
    {% set current_pin = printer['output_pin Adaptive_PURGE_Line'].value | int %}
    {% set saved_state = printer.save_variables.variables.purge_mode | default(1) | int %}
    {% if current_pin != saved_state %}
        SAVE_VARIABLE VARIABLE=purge_mode VALUE={current_pin}
    {% endif %}
    UPDATE_DELAYED_GCODE ID=SYNC_PURGE_LOOP DURATION=3

[gcode_macro DRAW_PRIME_LINE]
description: Classic prime line
gcode:
   M204 S2000
   G90 ## XYZ in absolute mode
   G1 Z3 F600
   M83
   G1 Y70 F12000
   G1 X0 F12000
   G1 Z0.2 F600
   G1 X0 Y70 F6000
   G1 E0.8 F300
   G1 X0 Y0 E7 F5000
   G1 X70 Y0 E7 F5000
   G92 E0
   G1 Z1 F600

[gcode_macro MY_PURGE]
description: A purge macro that adapts to be near your actual printed objects
gcode:
    # Purge settings
    {% set purge_height = 0.8 | float %}            # Z position of nozzle during purge. Default is 0.8.
    {% set tip_distance = 0 | float %}              # Distance between tip of filament and nozzle before purge. Default is 0.
    {% set flow_rate    = 12 | float %}             # Flow rate of purge in mm3/s. Default is 12.
    {% set purge_amount = 25 | float %}             # Amount of filament to be purged prior to printing. Default is 50.
    {% set purge_margin = 12 | float %}             # Distance the purge will be in front of the print area. Default is 10.

    # Get relevant printer params
    {% set travel_speed = (printer.toolhead.max_velocity) * 60 | float %}
    {% set cross_section = printer.configfile.settings.extruder.max_extrude_cross_section | float %}

    # Use firmware retraction if it is defined
    {% if printer.firmware_retraction is defined %}
        {% set RETRACT = G10 | string %}
    {% else %}
        {% set RETRACT = 'G1 E-0.6 F2400' | string %}
    {% endif %}

    {% set bed_x_max = printer["gcode_macro PRINTER_PARAM"].max_x_position | float %}
    {% set bed_y_max = printer["gcode_macro PRINTER_PARAM"].max_y_position | float %}

    # Rapid move distance to break string
    {% set rapid_move = 10 %}

    # Calculate purge origins and centers from objects
    {% set all_points = printer.exclude_object.objects | map(attribute='polygon') | sum(start=[]) %}    # Get all object points
    {% set purge_x_min = (all_points | map(attribute=0) | min | default(0)) %}                          # Object x min
    {% set purge_x_max = (all_points | map(attribute=0) | max | default(0)) %}                          # Object x max
    {% set purge_y_min = (all_points | map(attribute=1) | min | default(0)) %}                          # Object y min
    {% set purge_y_max = (all_points | map(attribute=1) | max | default(0)) %}                          # Object y max

    {% set detect_object = purge_x_min + purge_x_max + purge_y_min + purge_y_max %}                     # Object size > 0

    {% set purge_x_center = ([((purge_x_max + purge_x_min) / 2) - (purge_amount / 2), 0] | max) %}      # Start point of purge line relative to print on X axis
    {% set purge_y_center = ([((purge_y_max + purge_y_min) / 2) - (purge_amount / 2), 0] | max) %}      # Start point of purge line relative to print on Y axis

    {% if (purge_x_center + purge_amount + rapid_move) > bed_x_max %}
        {% set purge_x_center = (bed_x_max - (purge_amount + rapid_move)) %}
    {% endif %}
    {% if (purge_y_center + purge_amount + rapid_move) > bed_y_max %}
        {% set purge_y_center = (bed_y_max - (purge_amount + rapid_move)) %}
    {% endif %}

    {% set purge_x_origin_low = (purge_x_min - purge_margin) %}
    {% set purge_x_origin_high = (purge_x_max + purge_margin) %}
    {% set purge_y_origin_low = (purge_y_min - purge_margin) %}
    {% set purge_y_origin_high = (purge_y_max + purge_margin) %}

    {% set purge_move_speed = (flow_rate / 5.0) * 60 | float %}

    {% if cross_section < 5 %}
        RESPOND TYPE=command MSG="[Extruder] max_extrude_cross_section is insufficient for line purge, please set it to 5 or greater. Purge skipped."
    {% else %}
        SAVE_GCODE_STATE NAME=Prepurge_State
        {% if detect_object == 0 %}
            RESPOND TYPE=command MSG="No object detected! Using classic purge line."
            DRAW_PRIME_LINE
            {RETRACT}
        {% elif purge_y_origin_low > 0 %}
            RESPOND TYPE=command MSG="Purge line starting at {purge_x_center}, {purge_y_origin_low} and purging {purge_amount}mm of filament, requested flow rate is {flow_rate}mm3/s."
            G92 E0
            G0 F{travel_speed}
            G90
            G0 X{purge_x_center} Y{purge_y_origin_low}
            G0 Z{purge_height}
            M83
            G1 E{tip_distance} F{purge_move_speed}
            G1 X{purge_x_center + purge_amount} E{purge_amount} F{purge_move_speed}
            {RETRACT}
            G0 X{purge_x_center + purge_amount + rapid_move} F{travel_speed}         
            G92 E0
            G0 Z{purge_height * 2} F{travel_speed}
        {% elif purge_x_origin_low > 0 %}
            RESPOND TYPE=command MSG="Purge line starting at {purge_x_origin_low}, {purge_y_center} and purging {purge_amount}mm of filament, requested flow rate is {flow_rate}mm3/s."
            G92 E0
            G0 F{travel_speed}
            G90
            G0 X{purge_x_origin_low} Y{purge_y_center}
            G0 Z{purge_height}
            M83
            G1 E{tip_distance} F{purge_move_speed}
            G1 Y{purge_y_center + purge_amount} E{purge_amount} F{purge_move_speed}
            {RETRACT}
            G0 Y{purge_y_center + purge_amount + rapid_move} F{travel_speed}
            G92 E0
            G0 Z{purge_height * 2} F{travel_speed}
        {% elif purge_y_origin_high < bed_y_max %}
            RESPOND TYPE=command MSG="Purge line starting at {purge_x_center}, {purge_y_origin_high} and purging {purge_amount}mm of filament, requested flow rate is {flow_rate}mm3/s."
            G92 E0
            G0 F{travel_speed}
            G90
            G0 X{purge_x_center} Y{purge_y_origin_high}
            G0 Z{purge_height}
            M83
            G1 E{tip_distance} F{purge_move_speed}
            G1 X{purge_x_center + purge_amount} E{purge_amount} F{purge_move_speed}
            {RETRACT}
            G0 X{purge_x_center + purge_amount + rapid_move} F{travel_speed}
            G92 E0
            G0 Z{purge_height * 2} F{travel_speed}
        {% elif purge_x_origin_high < bed_x_max %}
            RESPOND TYPE=command MSG="Purge line starting at {purge_x_origin_high}, {purge_y_center} and purging {purge_amount}mm of filament, requested flow rate is {flow_rate}mm3/s."
            G92 E0
            G0 F{travel_speed}
            G90
            G0 X{purge_x_origin_high} Y{purge_y_center}
            G0 Z{purge_height}
            M83
            G1 E{tip_distance} F{purge_move_speed}
            G1 Y{purge_y_center + purge_amount} E{purge_amount} F{purge_move_speed}
            {RETRACT}
            G0 Y{purge_y_center + purge_amount + rapid_move} F{travel_speed}
            G92 E0
            G0 Z{purge_height * 2} F{travel_speed}
        {% else %}
            RESPOND TYPE=command MSG="No space for purge line! Using classic purge line."
            DRAW_PRIME_LINE
            {RETRACT}
        {% endif %}
        RESTORE_GCODE_STATE NAME=Prepurge_State
    {% endif %}

[gcode_macro LINE_PURGE]
description: Slicer Start G-code PURGE Line
gcode:
  {% if printer['output_pin Adaptive_PURGE_Line'].value == 1 %}
    RESPOND TYPE=command MSG="Starting Adaptive Purge Line..."
    MY_PURGE
  {% else %}  
    RESPOND TYPE=command MSG="Starting Classic Prime Line..."
    DRAW_PRIME_LINE
  {% endif %}


